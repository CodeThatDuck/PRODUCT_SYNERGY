version: "3.8"

services:
  db2:
    image: docker.io/ibmcom/db2
    platform: linux/amd64
    container_name: product-synergy-db2
    restart: unless-stopped
    privileged: true
    # Added extra capacity for DB2 to handle the Mac emulation
    shm_size: '256m' 

    environment:
      LICENSE: accept
      DB2INSTANCE: db2inst1
      DB2INST1_PASSWORD: password
      DBNAME: proddb  # Changed from productdb (9 chars) to proddb (6 chars)
      BLU: "false"
      ENABLE_ORACLE_COMPATIBILITY: "true"
      # Additional setting to help with restricted environments
      PERSISTENT_HOME: "false" 

    volumes:
      - db2_data:/database

    networks:
      - product-synergy

  backend:
    build:
      context: .                          # Build using Dockerfile in project root
    platform: linux/amd64                 # Force x86 emulation — required for ibm_db on Apple Silicon Mac
    container_name: product-synergy-backend
    restart: unless-stopped
    depends_on:
      - db2                               # Wait for DB2 container to start first
    networks:
      - product-synergy

  frontend:
    build:
      context: ./frontend                 # Build using frontend/Dockerfile
    container_name: product-synergy-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"                       # Host port 3000 → Container port 3000 (same, easy to remember)
    depends_on:
      - backend                           # Wait for backend container to start first
    networks:
      - product-synergy

volumes:
  db2_data:

networks:
  product-synergy:
    external: true